<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESL 學習單生成器（4 歲）</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Noto+Sans+TC:wght@400;500;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FBF7EF; --card:#FFFFFF; --ink:#33312C; --muted:#8B8577;
    --teal:#2F8E7E; --teal-light:#E4F3EF; --coral:#E8734A; --coral-light:#FDEAE2;
    --sun:#F0B429; --sun-light:#FEF3D6; --line:#EAE3D3;
  }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--cream); color:var(--ink); font-family:'Noto Sans TC',sans-serif; }

  /* ---------- shell layout ---------- */
  header{ padding:28px 24px 18px; max-width:1100px; margin:0 auto; }
  .eyebrow{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:12px; letter-spacing:3px; color:var(--coral); text-transform:uppercase; }
  h1{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:30px; margin:6px 0 4px; }
  .sub{ color:var(--muted); font-size:14px; }

  nav.tabs{
    max-width:1100px; margin:0 auto; padding:0 24px 16px;
    display:flex; flex-wrap:wrap; gap:8px;
  }
  nav.tabs button{
    padding:9px 16px; border-radius:999px; border:2px solid var(--line);
    background:var(--card); font-family:'Baloo 2',sans-serif; font-weight:700;
    font-size:13px; color:var(--muted); cursor:pointer;
  }
  nav.tabs button.active{ background:var(--teal); border-color:var(--teal); color:#fff; }

  main{ max-width:1100px; margin:0 auto; padding:0 24px 60px; display:grid; grid-template-columns:320px 1fr; gap:20px; }
  @media (max-width: 800px){ main{ grid-template-columns:1fr; } }

  .panel{ display:none; }
  .panel.active{ display:contents; }
  @media (max-width: 800px){ .panel.active{ display:block; } }

  .controls{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:20px; align-self:start; position:sticky; top:16px;
  }
  .controls h2{ font-family:'Baloo 2',sans-serif; font-size:16px; margin:0 0 4px; }
  .controls .desc{ font-size:12px; color:var(--muted); margin-bottom:14px; line-height:1.5; }
  .controls label{ display:block; font-weight:700; font-size:12px; margin:12px 0 5px; }
  .controls textarea, .controls input[type=text], .controls input[type=number], .controls select{
    width:100%; padding:9px 10px; border-radius:9px; border:2px solid var(--line);
    font-family:inherit; font-size:13px; color:var(--ink); background:#fff;
  }
  .controls textarea{ min-height:90px; resize:vertical; }
  .controls .hint{ font-size:11px; color:var(--muted); margin-top:3px; }
  .controls .row2{ display:flex; gap:8px; }
  .controls .row2 > div{ flex:1; }
  .radio-row{ display:flex; gap:14px; margin-top:4px; }
  .radio-row label{ display:flex; align-items:center; gap:5px; font-weight:400; font-size:12px; margin:0; }

  .gen-btn{
    margin-top:18px; width:100%; padding:12px; border:none; border-radius:11px;
    background:var(--teal); color:#fff; font-family:'Baloo 2',sans-serif; font-weight:700;
    font-size:14px; cursor:pointer;
  }
  .gen-btn:hover{ opacity:.9; }
  .print-btn{ background:var(--coral); margin-top:8px; }

  .preview-wrap{ min-width:0; }
  .preview-toolbar{
    display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;
  }
  .preview-toolbar .name{ font-family:'Baloo 2',sans-serif; font-weight:700; font-size:14px; color:var(--muted); }

  .worksheet{
    background:#fff; border:1px solid var(--line); border-radius:12px;
    padding:26px 30px; min-height:400px;
  }
  .ws-title{ font-family:'Baloo 2',sans-serif; font-weight:800; font-size:22px; margin:0 0 4px; }
  .ws-sub{ color:var(--muted); font-size:12px; margin-bottom:6px; }
  .ws-name-line{ font-size:13px; color:var(--ink); margin-bottom:18px; }
  .ws-name-line .blank{ display:inline-block; width:160px; border-bottom:1.5px dashed #ccc; margin:0 6px; }

  .empty-state{ color:var(--muted); font-size:13px; text-align:center; padding:80px 0; }

  /* ---------- print ---------- */
  @media print{
    body *{ visibility:hidden; }
    .worksheet, .worksheet *{ visibility:visible; }
    .worksheet{ position:absolute; top:0; left:0; width:100%; border:none; padding:0; }
    @page{ size:A4; margin:14mm; }
  }
</style>
</head>
<body>

<header>
  <div class="eyebrow">ESL worksheet studio · age 4</div>
  <h1>ESL 學習單生成器（4 歲）</h1>
  <div class="sub">給 4 歲幼兒英語學習者：不太需要認字的入門練習單</div>
</header>

<nav class="tabs" id="tabs">
  <button data-tab="picpic" class="active">🔵 圖片配對</button>
  <button data-tab="counting">🔢 數字與單字</button>
  <button data-tab="coloring">🎨 著色學習單</button>
  <button data-tab="tracing">✏️ 單字描寫</button>
  <button data-tab="sorting">🗂️ 分類練習單</button>
  <button data-tab="oddone">🔎 找不同</button>
  <button data-tab="abctrace">🔡 ABC 全字母描寫</button>
  <button data-tab="emotion">😊 情緒單字配對</button>
  <button data-tab="opposite">🔁 反義詞配對</button>
</nav>

<main id="main"></main>

<script src="modules.js"></script>
<script>
document.querySelectorAll('nav.tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    document.querySelectorAll('nav.tabs button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderTab(btn.dataset.tab);
  });
});
renderTab('picpic');
</script>
</body>
</html>
